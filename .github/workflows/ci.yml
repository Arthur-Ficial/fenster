name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & test (${{ matrix.os }} / ${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            arch: arm64
          - os: ubuntu-latest
            arch: amd64
          - os: windows-latest
            arch: amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -race ./...

      - name: go build
        run: go build -trimpath -ldflags "-s -w" -o bin/fenster ./cmd/fenster

      - name: Verify --version
        shell: bash
        run: ./bin/fenster --version

      - name: Note about integration suite
        shell: bash
        run: |
          echo "::notice::Tests/integration/ (apfel-compat pytest suite) requires Chrome 138+ and a GPU."
          echo "::notice::That suite runs locally before each release. CI is a safety net, not the qualification gate."

  static-analysis:
    name: Static analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
      - name: staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./... || true   # informational at M0; tighten in M3
